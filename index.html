<!doctype html>
<html lang="th">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta name="theme-color" content="#0f766e">
<title>ระบบจัดการแรงงาน</title>
<style>
:root{--bg:#f3f7f7;--card:#fff;--ink:#16302f;--muted:#6d7f7e;--line:#d9e5e4;--primary:#0f766e;--primary2:#115e59;--soft:#dff4f1;--danger:#b42318;--dangerbg:#fee4e2;--ok:#027a48;--okbg:#dcfae6;--shadow:0 14px 40px rgba(15,118,110,.12);--radius:22px}
*{box-sizing:border-box}body{margin:0;font-family:Inter,system-ui,-apple-system,"Segoe UI",Tahoma,sans-serif;background:radial-gradient(circle at top right,rgba(15,118,110,.12),transparent 34%),var(--bg);color:var(--ink);min-height:100vh}
button,input,select{font:inherit}.hidden{display:none!important}.app{max-width:1100px;margin:auto;padding:18px 14px 40px}.auth-wrap{min-height:100vh;display:grid;place-items:center;padding:18px}.auth-card{width:min(440px,100%);background:var(--card);border-radius:28px;padding:28px;box-shadow:var(--shadow);border:1px solid var(--line)}.auth-logo{width:72px;height:72px;border-radius:22px;background:linear-gradient(135deg,var(--primary),#134e4a);color:#fff;display:grid;place-items:center;font-size:34px;margin-bottom:18px}.auth-card h1{margin:0 0 6px}.auth-card p{margin:0 0 22px;color:var(--muted)}
.topbar{display:flex;justify-content:space-between;gap:16px;align-items:center;background:linear-gradient(135deg,#0f766e,#134e4a);color:#fff;padding:22px;border-radius:28px;box-shadow:var(--shadow);position:sticky;top:10px;z-index:20}.brand h1{margin:0 0 4px;font-size:clamp(24px,5vw,38px)}.brand p{margin:0;opacity:.82;font-size:14px}.top-actions,.lang-switch,.actions,.worker-head-actions{display:flex;gap:8px;flex-wrap:wrap}.top-actions button,.lang-switch button{border:0;background:rgba(255,255,255,.15);color:#fff;padding:10px 13px;border-radius:11px;cursor:pointer;font-weight:800}.lang-switch button.active{background:#fff;color:var(--primary)}
.tabs{display:flex;gap:8px;margin-top:18px}.tab{border:0;border-radius:14px;padding:12px 18px;font-weight:900;cursor:pointer;background:#e7efee;color:var(--primary2)}.tab.active{background:var(--primary);color:#fff}
.card{margin-top:18px;background:var(--card);border:1px solid var(--line);border-radius:var(--radius);padding:20px;box-shadow:var(--shadow)}.section-title{display:flex;justify-content:space-between;align-items:center;gap:12px;margin-bottom:16px}.section-title h2{margin:0;font-size:22px}.grid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:14px}.field{display:flex;flex-direction:column;gap:7px}.field.full{grid-column:1/-1}label{font-weight:800;font-size:14px}
input,select{width:100%;border:1px solid var(--line);border-radius:14px;padding:13px 14px;background:#fbfdfd;color:var(--ink);outline:none}input:focus,select:focus{border-color:var(--primary);box-shadow:0 0 0 4px rgba(15,118,110,.1);background:#fff}
.workers,.project-list{display:flex;flex-direction:column;gap:14px}.worker-card,.project-row{border:1px solid var(--line);border-radius:18px;padding:16px;background:#fbfdfd}.worker-head,.project-row{display:flex;justify-content:space-between;align-items:center;gap:12px}.worker-head{margin-bottom:14px}.worker-number{font-weight:900}.worker-grid{display:grid;grid-template-columns:1.4fr repeat(3,1fr);gap:12px;align-items:end}.hours-pill{background:var(--soft);color:var(--primary2);font-weight:900;border-radius:12px;padding:13px;text-align:center}
.project-info strong{display:block;font-size:17px}.project-info small{color:var(--muted)}.project-meta{display:flex;gap:8px;flex-wrap:wrap;margin-top:8px}.pill{padding:6px 10px;border-radius:999px;background:var(--soft);font-size:12px;font-weight:800}.pill.paid{background:var(--okbg);color:var(--ok)}.pill.unpaid{background:var(--dangerbg);color:var(--danger)}
.btn{border:0;border-radius:14px;padding:13px 18px;cursor:pointer;font-weight:900}.btn:disabled{opacity:.55;cursor:not-allowed}.btn-primary{background:var(--primary);color:#fff}.btn-secondary{background:var(--soft);color:var(--primary2)}.btn-danger{background:var(--dangerbg);color:var(--danger)}.btn-small{padding:9px 12px;border-radius:11px}.summary{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:12px}.stat{border-radius:18px;padding:18px;background:#f8fbfb;border:1px solid var(--line)}.stat small{display:block;color:var(--muted);font-weight:800;margin-bottom:8px}.stat strong{font-size:26px}
.payment{display:flex;gap:10px;flex-wrap:wrap;margin-top:14px}.payment label{flex:1;min-width:180px;border:1px solid var(--line);border-radius:16px;padding:14px;cursor:pointer;background:#fff;display:flex;align-items:center;gap:10px}.payment input{width:auto}.payment label.active-paid{background:var(--okbg);border-color:#75e0a7}.payment label.active-unpaid{background:var(--dangerbg);border-color:#fda29b}
.footer-actions{position:sticky;bottom:10px;background:rgba(243,247,247,.92);backdrop-filter:blur(12px);padding-top:12px;margin-top:18px}.footer-actions .card{margin:0;padding:14px}.notice{font-size:13px;color:var(--muted);margin-top:10px}.empty{padding:24px;text-align:center;color:var(--muted);border:1px dashed var(--line);border-radius:16px}
.modal{position:fixed;inset:0;background:rgba(10,30,29,.55);display:grid;place-items:center;padding:16px;z-index:100}.modal-card{width:min(500px,100%);background:#fff;border-radius:24px;padding:22px;box-shadow:var(--shadow)}.modal-card h2{margin-top:0}.modal-actions{display:flex;justify-content:flex-end;gap:8px;margin-top:18px}.error{background:var(--dangerbg);color:var(--danger);padding:11px 13px;border-radius:12px;margin-bottom:14px;font-weight:700}.success{background:var(--okbg);color:var(--ok);padding:11px 13px;border-radius:12px;margin-bottom:14px;font-weight:700}.loading{opacity:.65;pointer-events:none}
@media(max-width:760px){.topbar{position:relative;top:0;align-items:flex-start;flex-direction:column}.grid,.summary{grid-template-columns:1fr}.worker-grid{grid-template-columns:1fr 1fr}.worker-grid .name-field{grid-column:1/-1}.hours-pill{grid-column:1/-1}.project-row{align-items:flex-start;flex-direction:column}.project-row .actions{width:100%}.project-row .actions .btn{flex:1}}

</head>
<body>
<section id="loginScreen" class="auth-wrap">
<div class="auth-card">
<div class="auth-logo">👷</div>
<h1 data-i18n="loginTitle">เข้าสู่ระบบ</h1><p data-i18n="loginSubtitle">ระบบจัดการแรงงานสำหรับวิท</p>
<div id="loginMessage"></div>
<div class="field"><label data-i18n="username">ชื่อผู้ใช้</label><input id="loginUsername" autocomplete="username"></div>
<div class="field" style="margin-top:12px"><label data-i18n="password">รหัสผ่าน</label><input id="loginPassword" type="password" autocomplete="current-password"></div>
<button id="loginBtn" class="btn btn-primary" style="width:100%;margin-top:18px" data-i18n="login">เข้าสู่ระบบ</button>
<div class="lang-switch" style="margin-top:14px;background:var(--soft)"><button id="loginThBtn" class="active" style="color:var(--primary)">ไทย</button><button id="loginEnBtn" style="color:var(--primary)">English</button></div>
</div>
</section>

<main id="app" class="app hidden">
<header class="topbar">
<div class="brand"><h1 data-i18n="appTitle">ระบบจัดการแรงงาน</h1><p id="welcomeText"></p></div>
<div class="top-actions"><div class="lang-switch"><button id="thBtn" class="active">ไทย</button><button id="enBtn">English</button></div><button id="adminBtn" data-i18n="admin">ผู้ดูแลระบบ</button><button id="logoutBtn" data-i18n="logout">ออกจากระบบ</button></div>
</header>
<div class="tabs"><button id="editorTab" class="tab active" data-i18n="projectEditor">โครงการ</button><button id="historyTab" class="tab" data-i18n="history">ประวัติ</button></div>

<section id="editorView">
<section class="card">
<div class="section-title"><h2 data-i18n="projectDetails">รายละเอียดโครงการ</h2><span id="editBadge" class="pill hidden" data-i18n="editing">กำลังแก้ไข</span></div>
<div class="grid">
<div class="field"><label data-i18n="projectName">ชื่อโครงการ</label><input id="projectName" data-i18n-placeholder="projectNamePh"></div>
<div class="field"><label data-i18n="date">วันที่</label><input id="projectDate" type="date"></div>
<div class="field full"><label data-i18n="projectAddress">ที่อยู่โครงการ</label><input id="projectAddress" data-i18n-placeholder="projectAddressPh"></div>
<div class="field full"><label data-i18n="clientName">ชื่อผู้ว่าจ้าง</label><input id="clientName" data-i18n-placeholder="clientNamePh"></div>
</div>
</section>
<section class="card"><div class="section-title"><h2 data-i18n="workers">คนงาน</h2><button id="addWorkerBtn" class="btn btn-secondary" data-i18n="addWorker">+ เพิ่มคนงาน</button></div><div id="workers" class="workers"></div></section>
<section class="card"><div class="section-title"><h2 data-i18n="summary">สรุปโครงการ</h2></div><div class="summary"><div class="stat"><small data-i18n="workersCount">จำนวนคนงาน</small><strong id="workersCount">0</strong></div><div class="stat"><small data-i18n="totalHours">ชั่วโมงรวม</small><strong id="totalHours">0.00</strong></div><div class="stat"><small data-i18n="projectTotal">ยอดรวมโครงการ</small><strong id="projectTotal">₪0.00</strong></div></div><div class="payment"><label id="paidLabel"><input type="radio" name="paymentStatus" value="paid"><span data-i18n="paid">ชำระแล้ว</span></label><label id="unpaidLabel"><input type="radio" name="paymentStatus" value="unpaid" checked><span data-i18n="unpaid">ยังไม่ได้ชำระ</span></label></div></section>
<div class="footer-actions"><div class="card"><div class="actions"><button id="saveBtn" class="btn btn-primary" data-i18n="saveCloud">บันทึกในระบบคลาวด์</button><button id="newBtn" class="btn btn-secondary" data-i18n="newProject">โครงการใหม่</button><button id="exportBtn" class="btn btn-secondary" data-i18n="export">ส่งออก CSV</button></div><div class="notice" id="statusMsg" data-i18n="cloudNotice">ข้อมูลถูกบันทึกใน Netlify Database</div></div></div>
</section>

<section id="historyView" class="hidden">
<section class="card"><div class="section-title"><h2 data-i18n="projectHistory">ประวัติโครงการ</h2><button id="refreshBtn" class="btn btn-secondary" data-i18n="refresh">รีเฟรช</button></div><div id="projectList" class="project-list"></div></section>
</section>
</main>

<div id="adminModal" class="modal hidden"><div class="modal-card"><h2 data-i18n="adminTitle">ตั้งค่าผู้ดูแลระบบ</h2><div id="adminMessage"></div><div class="field"><label data-i18n="currentPassword">รหัสผ่านปัจจุบัน</label><input id="currentPassword" type="password"></div><div class="field" style="margin-top:12px"><label data-i18n="newPassword">รหัสผ่านใหม่</label><input id="newPassword" type="password"></div><div class="field" style="margin-top:12px"><label data-i18n="confirmPassword">ยืนยันรหัสผ่านใหม่</label><input id="confirmPassword" type="password"></div><div class="modal-actions"><button id="closeAdminBtn" class="btn btn-secondary" data-i18n="cancel">ยกเลิก</button><button id="changePasswordBtn" class="btn btn-primary" data-i18n="changePassword">เปลี่ยนรหัสผ่าน</button></div></div></div>

<script>
const tr={
th:{loginTitle:"เข้าสู่ระบบ",loginSubtitle:"ระบบจัดการแรงงานสำหรับวิท",username:"ชื่อผู้ใช้",password:"รหัสผ่าน",login:"เข้าสู่ระบบ",invalidLogin:"ชื่อผู้ใช้หรือรหัสผ่านไม่ถูกต้อง",setupMissing:"ยังไม่ได้ตั้งค่าชื่อผู้ใช้และรหัสผ่านเริ่มต้นใน Netlify",appTitle:"ระบบจัดการแรงงาน",welcome:"ผู้จัดการงาน",admin:"ผู้ดูแลระบบ",logout:"ออกจากระบบ",projectEditor:"โครงการ",history:"ประวัติ",projectDetails:"รายละเอียดโครงการ",editing:"กำลังแก้ไข",projectName:"ชื่อโครงการ",projectNamePh:"กรอกชื่อโครงการ",date:"วันที่",projectAddress:"ที่อยู่โครงการ",projectAddressPh:"กรอกที่อยู่",clientName:"ชื่อผู้ว่าจ้าง",clientNamePh:"กรอกชื่อผู้ว่าจ้าง",workers:"คนงาน",addWorker:"+ เพิ่มคนงาน",worker:"คนงาน",workerName:"ชื่อคนงาน",workerNamePh:"กรอกชื่อคนงาน",startTime:"เวลาเริ่ม",endTime:"เวลาสิ้นสุด",workerPay:"ค่าจ้างคนงาน",hours:"ชั่วโมง",remove:"ลบ",sendSummary:"ส่งสรุป",summary:"สรุปโครงการ",workersCount:"จำนวนคนงาน",totalHours:"ชั่วโมงรวม",projectTotal:"ยอดรวมโครงการ",paid:"ชำระแล้ว",unpaid:"ยังไม่ได้ชำระ",saveCloud:"บันทึกในระบบคลาวด์",newProject:"โครงการใหม่",export:"ส่งออก CSV",cloudNotice:"ข้อมูลถูกบันทึกใน Netlify Database",saved:"บันทึกโครงการเรียบร้อยแล้ว",updated:"อัปเดตโครงการเรียบร้อยแล้ว",fillName:"กรุณากรอกชื่อโครงการ",noWorkers:"กรุณาเพิ่มคนงานอย่างน้อยหนึ่งคน",noData:"ยังไม่มีคนงาน",confirmNew:"เริ่มโครงการใหม่และล้างแบบฟอร์ม?",adminTitle:"ตั้งค่าผู้ดูแลระบบ",currentPassword:"รหัสผ่านปัจจุบัน",newPassword:"รหัสผ่านใหม่",confirmPassword:"ยืนยันรหัสผ่านใหม่",changePassword:"เปลี่ยนรหัสผ่าน",cancel:"ยกเลิก",wrongCurrent:"รหัสผ่านปัจจุบันไม่ถูกต้อง",passwordMismatch:"รหัสผ่านใหม่ไม่ตรงกัน",passwordShort:"รหัสผ่านต้องมีอย่างน้อย 8 ตัวอักษร",passwordChanged:"เปลี่ยนรหัสผ่านเรียบร้อยแล้ว",shareTitle:"สรุปเวลาทำงาน",shareCopied:"คัดลอกสรุปแล้ว",shareFailed:"ไม่สามารถเปิดการแชร์ได้",project:"โครงการ",address:"ที่อยู่",client:"ผู้ว่าจ้าง",wage:"ค่าจ้าง",status:"สถานะ",projectHistory:"ประวัติโครงการ",refresh:"รีเฟรช",open:"เปิด",delete:"ลบ",confirmDelete:"ลบโครงการนี้หรือไม่?",deleted:"ลบโครงการแล้ว",noProjects:"ยังไม่มีโครงการที่บันทึก",serverError:"เกิดข้อผิดพลาดในการเชื่อมต่อ",saving:"กำลังบันทึก...",loading:"กำลังโหลด..."},
en:{loginTitle:"Sign in",loginSubtitle:"Worker management system for Wit",username:"Username",password:"Password",login:"Sign in",invalidLogin:"Incorrect username or password",setupMissing:"Initial username and password are not configured in Netlify",appTitle:"Worker Management",welcome:"Site Manager",admin:"Admin",logout:"Log out",projectEditor:"Project",history:"History",projectDetails:"Project details",editing:"Editing",projectName:"Project name",projectNamePh:"Enter project name",date:"Date",projectAddress:"Project address",projectAddressPh:"Enter project address",clientName:"Project client",clientNamePh:"Enter client name",workers:"Workers",addWorker:"+ Add worker",worker:"Worker",workerName:"Worker name",workerNamePh:"Enter worker name",startTime:"Start time",endTime:"End time",workerPay:"Worker wage",hours:"Hours",remove:"Remove",sendSummary:"Send summary",summary:"Project summary",workersCount:"Workers",totalHours:"Total hours",projectTotal:"Project total",paid:"Paid",unpaid:"Not paid",saveCloud:"Save to cloud",newProject:"New project",export:"Export CSV",cloudNotice:"Data is stored in Netlify Database",saved:"Project saved successfully",updated:"Project updated successfully",fillName:"Please enter a project name",noWorkers:"Please add at least one worker",noData:"No workers yet",confirmNew:"Start a new project and clear the form?",adminTitle:"Admin settings",currentPassword:"Current password",newPassword:"New password",confirmPassword:"Confirm new password",changePassword:"Change password",cancel:"Cancel",wrongCurrent:"Current password is incorrect",passwordMismatch:"New passwords do not match",passwordShort:"Password must contain at least 8 characters",passwordChanged:"Password changed successfully",shareTitle:"Work summary",shareCopied:"Summary copied",shareFailed:"Unable to open sharing",project:"Project",address:"Address",client:"Client",wage:"Wage",status:"Status",projectHistory:"Project history",refresh:"Refresh",open:"Open",delete:"Delete",confirmDelete:"Delete this project?",deleted:"Project deleted",noProjects:"No saved projects yet",serverError:"Connection error",saving:"Saving...",loading:"Loading..."}};
let lang=localStorage.getItem("workers_lang")||"th",workers=[],currentProjectId=null,currentUser=null;
const $=s=>document.querySelector(s),$$=s=>[...document.querySelectorAll(s)],t=k=>tr[lang][k]||k;
async function api(path,options={}){const res=await fetch("/api"+path,{credentials:"same-origin",headers:{"content-type":"application/json",...(options.headers||{})},...options});let data={};try{data=await res.json()}catch{}if(res.status===401&&path!=="/login"){showLogin();throw new Error("UNAUTHORIZED")}if(!res.ok){const e=new Error(data.error||"SERVER_ERROR");e.code=data.error;e.status=res.status;throw e}return data}
function setLanguage(next){lang=next;localStorage.setItem("workers_lang",lang);document.documentElement.lang=lang;["thBtn","loginThBtn"].forEach(id=>$("#"+id)?.classList.toggle("active",lang==="th"));["enBtn","loginEnBtn"].forEach(id=>$("#"+id)?.classList.toggle("active",lang==="en"));$$("[data-i18n]").forEach(el=>el.textContent=t(el.dataset.i18n));$$("[data-i18n-placeholder]").forEach(el=>el.placeholder=t(el.dataset.i18nPlaceholder));if(currentUser)$("#welcomeText").textContent=`${currentUser.displayName} · ${t("welcome")}`;renderWorkers()}
function showLogin(){$("#loginScreen").classList.remove("hidden");$("#app").classList.add("hidden")}
function showApp(){$("#loginScreen").classList.add("hidden");$("#app").classList.remove("hidden");$("#welcomeText").textContent=`${currentUser.displayName} · ${t("welcome")}`;newProject(false)}
async function checkSession(){try{const d=await api("/me");currentUser=d.user;showApp()}catch{showLogin()}}
async function login(){setBusy($("#loginBtn"),true,t("loading"));$("#loginMessage").innerHTML="";try{const d=await api("/login",{method:"POST",body:JSON.stringify({username:$("#loginUsername").value.trim(),password:$("#loginPassword").value})});currentUser=d.user;$("#loginPassword").value="";showApp()}catch(e){const msg=e.code==="BOOTSTRAP_NOT_CONFIGURED"?t("setupMissing"):t("invalidLogin");$("#loginMessage").innerHTML=`<div class="error">${msg}</div>`}finally{setBusy($("#loginBtn"),false,t("login"))}}
async function logout(){try{await api("/logout",{method:"POST"})}finally{currentUser=null;showLogin()}}
function uid(){return crypto.randomUUID?crypto.randomUUID():Math.random().toString(36).slice(2)}
function addWorker(d={}){workers.push({localId:uid(),id:d.id||null,name:d.name||"",start:d.start||"08:00",end:d.end||"17:00",wage:Number(d.wage??d.pay??0)});renderWorkers()}
function calcHours(s,e){if(!s||!e)return 0;const[sh,sm]=s.split(":").map(Number),[eh,em]=e.split(":").map(Number);let m=(eh*60+em)-(sh*60+sm);if(m<0)m+=1440;return m/60}
function esc(v){return String(v).replace(/[&<>"']/g,m=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#039;"}[m]))}
function renderWorkers(){const wrap=$("#workers");if(!wrap)return;if(!workers.length){wrap.innerHTML=`<div class="empty">${t("noData")}</div>`;updateSummary();return}wrap.innerHTML=workers.map((w,i)=>`<div class="worker-card" data-id="${w.localId}"><div class="worker-head"><div class="worker-number">${t("worker")} ${i+1}</div><div class="worker-head-actions"><button class="btn btn-secondary btn-small" data-share="${w.localId}">${t("sendSummary")}</button><button class="btn btn-danger btn-small" data-remove="${w.localId}">${t("remove")}</button></div></div><div class="worker-grid"><div class="field name-field"><label>${t("workerName")}</label><input data-field="name" value="${esc(w.name)}" placeholder="${t("workerNamePh")}"></div><div class="field"><label>${t("startTime")}</label><input data-field="start" type="time" value="${w.start}"></div><div class="field"><label>${t("endTime")}</label><input data-field="end" type="time" value="${w.end}"></div><div class="field"><label>${t("workerPay")} (₪)</label><input data-field="wage" type="number" min="0" step="0.01" value="${w.wage||""}"></div><div class="hours-pill">${t("hours")}: ${calcHours(w.start,w.end).toFixed(2)}</div></div></div>`).join("");$$("[data-remove]").forEach(b=>b.onclick=()=>{workers=workers.filter(w=>w.localId!==b.dataset.remove);renderWorkers()});$$("[data-share]").forEach(b=>b.onclick=()=>shareWorker(b.dataset.share));$$(".worker-card input").forEach(i=>i.onchange=e=>{const w=workers.find(x=>x.localId===e.target.closest(".worker-card").dataset.id),f=e.target.dataset.field;w[f]=f==="wage"?Number(e.target.value||0):e.target.value;renderWorkers()});updateSummary()}
function updateSummary(){const h=workers.reduce((s,w)=>s+calcHours(w.start,w.end),0),p=workers.reduce((s,w)=>s+Number(w.wage||0),0);$("#workersCount").textContent=workers.length;$("#totalHours").textContent=h.toFixed(2);$("#projectTotal").textContent=new Intl.NumberFormat(lang==="th"?"th-TH":"en-US",{style:"currency",currency:"ILS"}).format(p);updatePaymentStyles()}
function collectData(){return{projectName:$("#projectName").value.trim(),projectAddress:$("#projectAddress").value.trim(),clientName:$("#clientName").value.trim(),projectDate:$("#projectDate").value,paymentStatus:$('input[name="paymentStatus"]:checked').value,workers:workers.map(w=>({name:w.name.trim(),start:w.start,end:w.end,wage:Number(w.wage||0)}))}}
function newProject(confirmFirst=true){if(confirmFirst&&currentProjectId&&!confirm(t("confirmNew")))return;currentProjectId=null;$("#editBadge").classList.add("hidden");["projectName","projectAddress","clientName"].forEach(id=>$("#"+id).value="");$("#projectDate").value=new Date().toISOString().slice(0,10);$('input[value="unpaid"]').checked=true;workers=[];addWorker();showTab("editor")}
function flash(msg){$("#statusMsg").textContent=msg;setTimeout(()=>$("#statusMsg").textContent=t("cloudNotice"),2600)}
function setBusy(el,busy,text){el.disabled=busy;el.textContent=text}
async function saveProject(){const d=collectData();if(!d.projectName){alert(t("fillName"));return}if(!d.workers.some(w=>w.name)){alert(t("noWorkers"));return}setBusy($("#saveBtn"),true,t("saving"));try{if(currentProjectId){await api(`/projects/${currentProjectId}`,{method:"PUT",body:JSON.stringify(d)});flash(t("updated"))}else{const r=await api("/projects",{method:"POST",body:JSON.stringify(d)});currentProjectId=r.id;$("#editBadge").classList.remove("hidden");flash(t("saved"))}}catch(e){alert(t("serverError")+": "+e.message)}finally{setBusy($("#saveBtn"),false,t("saveCloud"))}}
function showTab(tab){const editor=tab==="editor";$("#editorView").classList.toggle("hidden",!editor);$("#historyView").classList.toggle("hidden",editor);$("#editorTab").classList.toggle("active",editor);$("#historyTab").classList.toggle("active",!editor);if(!editor)loadProjects()}
async function loadProjects(){const list=$("#projectList");list.innerHTML=`<div class="empty">${t("loading")}</div>`;try{const d=await api("/projects");if(!d.projects.length){list.innerHTML=`<div class="empty">${t("noProjects")}</div>`;return}list.innerHTML=d.projects.map(p=>`<div class="project-row"><div class="project-info"><strong>${esc(p.projectName)}</strong><small>${esc(p.projectDate)} · ${esc(p.clientName||"-")}</small><div class="project-meta"><span class="pill">${p.workerCount} ${t("workersCount")}</span><span class="pill">${new Intl.NumberFormat(lang==="th"?"th-TH":"en-US",{style:"currency",currency:"ILS"}).format(p.totalWage)}</span><span class="pill ${p.paymentStatus}">${p.paymentStatus==="paid"?t("paid"):t("unpaid")}</span></div></div><div class="actions"><button class="btn btn-secondary btn-small" data-open="${p.id}">${t("open")}</button><button class="btn btn-danger btn-small" data-delete="${p.id}">${t("delete")}</button></div></div>`).join("");$$("[data-open]").forEach(b=>b.onclick=()=>openProject(b.dataset.open));$$("[data-delete]").forEach(b=>b.onclick=()=>deleteProject(b.dataset.delete))}catch(e){list.innerHTML=`<div class="error">${t("serverError")}</div>`}}
async function openProject(id){try{const d=await api(`/projects/${id}`),p=d.project;currentProjectId=p.id;$("#projectName").value=p.projectName;$("#projectAddress").value=p.projectAddress;$("#clientName").value=p.clientName;$("#projectDate").value=String(p.projectDate).slice(0,10);$(`input[value="${p.paymentStatus}"]`).checked=true;workers=[];p.workers.forEach(addWorker);if(!workers.length)addWorker();$("#editBadge").classList.remove("hidden");showTab("editor");renderWorkers()}catch{alert(t("serverError"))}}
async function deleteProject(id){if(!confirm(t("confirmDelete")))return;try{await api(`/projects/${id}`,{method:"DELETE"});if(currentProjectId===id)newProject(false);await loadProjects()}catch{alert(t("serverError"))}}
function workerSummary(w){const d=collectData(),status=d.paymentStatus==="paid"?t("paid"):t("unpaid");return `${t("shareTitle")}\n${t("workerName")}: ${w.name||"-"}\n${t("project")}: ${d.projectName||"-"}\n${t("address")}: ${d.projectAddress||"-"}\n${t("client")}: ${d.clientName||"-"}\n${t("date")}: ${d.projectDate||"-"}\n${t("startTime")}: ${w.start}\n${t("endTime")}: ${w.end}\n${t("hours")}: ${calcHours(w.start,w.end).toFixed(2)}\n${t("wage")}: ₪${Number(w.wage||0).toFixed(2)}\n${t("status")}: ${status}`}
async function shareWorker(localId){const w=workers.find(x=>x.localId===localId),text=workerSummary(w);if(currentProjectId){api(`/projects/${currentProjectId}/share`,{method:"POST",body:JSON.stringify({workerId:w.id,workerName:w.name})}).catch(()=>{})}try{if(navigator.share)await navigator.share({title:t("shareTitle"),text});else{await navigator.clipboard.writeText(text);flash(t("shareCopied"))}}catch(e){if(e.name!=="AbortError"){try{await navigator.clipboard.writeText(text);flash(t("shareCopied"))}catch{alert(t("shareFailed"))}}}
function updatePaymentStyles(){const v=$('input[name="paymentStatus"]:checked')?.value;$("#paidLabel").classList.toggle("active-paid",v==="paid");$("#unpaidLabel").classList.toggle("active-unpaid",v==="unpaid")}
function csvEsc(v){return `"${String(v??"").replace(/"/g,'""')}"`}function exportCSV(){const d=collectData(),rows=[["Project Name","Project Address","Client","Date","Worker Name","Start Time","End Time","Hours","Worker Wage ILS","Payment Status"]];d.workers.forEach(w=>rows.push([d.projectName,d.projectAddress,d.clientName,d.projectDate,w.name,w.start,w.end,calcHours(w.start,w.end).toFixed(2),Number(w.wage||0).toFixed(2),d.paymentStatus]));const blob=new Blob(["\uFEFF"+rows.map(r=>r.map(csvEsc).join(",")).join("\n")],{type:"text/csv;charset=utf-8"}),a=document.createElement("a");a.href=URL.createObjectURL(blob);a.download=(d.projectName||"project")+"-"+(d.projectDate||"")+".csv";a.click();URL.revokeObjectURL(a.href)}
function openAdmin(){$("#adminMessage").innerHTML="";["currentPassword","newPassword","confirmPassword"].forEach(id=>$("#"+id).value="");$("#adminModal").classList.remove("hidden")}function closeAdmin(){$("#adminModal").classList.add("hidden")}
async function changePassword(){const current=$("#currentPassword").value,next=$("#newPassword").value,confirmP=$("#confirmPassword").value;if(next.length<8){$("#adminMessage").innerHTML=`<div class="error">${t("passwordShort")}</div>`;return}if(next!==confirmP){$("#adminMessage").innerHTML=`<div class="error">${t("passwordMismatch")}</div>`;return}try{await api("/change-password",{method:"POST",body:JSON.stringify({currentPassword:current,newPassword:next})});$("#adminMessage").innerHTML=`<div class="success">${t("passwordChanged")}</div>`;setTimeout(closeAdmin,1000)}catch(e){$("#adminMessage").innerHTML=`<div class="error">${e.code==="WRONG_CURRENT_PASSWORD"?t("wrongCurrent"):t("serverError")}</div>`}}
$("#loginBtn").onclick=login;$("#loginPassword").addEventListener("keydown",e=>{if(e.key==="Enter")login()});$("#logoutBtn").onclick=logout;$("#adminBtn").onclick=openAdmin;$("#closeAdminBtn").onclick=closeAdmin;$("#changePasswordBtn").onclick=changePassword;$("#addWorkerBtn").onclick=()=>addWorker();$("#saveBtn").onclick=saveProject;$("#newBtn").onclick=()=>newProject(true);$("#exportBtn").onclick=exportCSV;$("#editorTab").onclick=()=>showTab("editor");$("#historyTab").onclick=()=>showTab("history");$("#refreshBtn").onclick=loadProjects;$$('input[name="paymentStatus"]').forEach(r=>r.onchange=updatePaymentStyles);[["thBtn","th"],["enBtn","en"],["loginThBtn","th"],["loginEnBtn","en"]].forEach(([id,l])=>$("#"+id).onclick=()=>setLanguage(l));setLanguage(lang);checkSession();
</script>
</body>
</html>
